spring:
  profiles:
    active: dev

jwt:
  secret: english-speaking-default-secret-key-2026
  expiration: 604800000

---
# ======== 开发环境 ========
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/english_speaking?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: 8088

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true

logging:
  level:
    com.es: DEBUG

# ======== AI Gateway 配置 ========
aigw:
  connect-timeout: 5000
  read-timeout: 30000
  max-retries: 3
  rate-limit-per-minute: 60
  asr:
    provider: tencent  # tencent / aliyun
  pronunciation:
    provider: chivox   # chivox / xunfei / xiansheng
  llm:
    provider: deepseek # deepseek / tongyi / openai

---
# ======== 生产环境 ========
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/english_speaking?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}

server:
  port: ${PORT:8080}
